name: CI

# Run on every push and pull request.
on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest

    # A throwaway Postgres for the tests, matching what tests/conftest.py expects.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ojas
          POSTGRES_PASSWORD: ojas_dev_password
          POSTGRES_DB: ojas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ojas:ojas_dev_password@localhost:5432/ojas_test
          SECRET_KEY: test-secret-key
          GROQ_API_KEY: test-key
        run: pytest -q

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck & build
        working-directory: frontend
        run: npm run build
